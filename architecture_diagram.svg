<svg width="680" height="760" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ServiceDesk Copilot architecture diagram</title>
<desc>End-to-end architecture showing user channels, the RAG retrieval pipeline, guardrails, the Azure OpenAI model layer, and the human escalation path.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="760" fill="#ffffff"/>

<!-- User channels tier -->
<g>
  <rect x="60" y="40" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="170" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#2C2C2A">Microsoft Teams</text>
  <text x="170" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#5F5E5A">Employee channel</text>
</g>
<g>
  <rect x="400" y="40" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="510" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#2C2C2A">Self-service portal</text>
  <text x="510" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#5F5E5A">Web widget channel</text>
</g>

<line x1="170" y1="96" x2="170" y2="130" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="510" y1="96" x2="510" y2="130" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M170 130 L170 150 L340 150" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
<path d="M510 130 L510 150 L340 150" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Guardrail layer -->
<g>
  <rect x="80" y="160" width="520" height="120" rx="20" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="100" y="184" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">Guardrail layer</text>
  <text x="100" y="200" dominant-baseline="central" font-family="Arial" font-size="12" fill="#712B13">Applied before any query reaches retrieval</text>
</g>
<g>
  <rect x="100" y="216" width="160" height="48" rx="10" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="180" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">PII redaction</text>
  <text x="180" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#712B13">Strips personal data</text>
</g>
<g>
  <rect x="280" y="216" width="160" height="48" rx="10" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="360" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">Prompt-injection defense</text>
  <text x="360" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#712B13">Adversarial filtering</text>
</g>
<g>
  <rect x="460" y="216" width="120" height="48" rx="10" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="520" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">Access scoping</text>
  <text x="520" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#712B13">General KB only</text>
</g>

<line x1="340" y1="280" x2="340" y2="310" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Retrieval layer -->
<g>
  <rect x="80" y="320" width="520" height="160" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="100" y="344" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#04342C">Retrieval layer</text>
  <text x="100" y="360" dominant-baseline="central" font-family="Arial" font-size="12" fill="#085041">Azure AI Search, hybrid retrieval</text>
</g>
<g>
  <rect x="100" y="376" width="220" height="84" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="210" y="398" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#04342C">Hybrid search index</text>
  <text x="210" y="416" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#085041">Keyword + vector</text>
  <text x="210" y="432" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#085041">Confidence scoring</text>
</g>
<g>
  <rect x="360" y="376" width="220" height="84" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="470" y="398" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#04342C">Curated knowledge base</text>
  <text x="470" y="416" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#085041">ServiceNow KB</text>
  <text x="470" y="432" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#085041">SharePoint IT Wiki</text>
</g>
<line x1="320" y1="418" x2="358" y2="418" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="340" y1="480" x2="340" y2="510" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Model layer -->
<g>
  <rect x="220" y="520" width="240" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="540" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#26215C">Azure OpenAI</text>
  <text x="340" y="558" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#3C3489">GPT-4o-class generation</text>
</g>

<line x1="340" y1="576" x2="340" y2="600" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 600 L200 600 L200 630" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 600 L480 600 L480 630" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="200" y="612" text-anchor="middle" font-family="Arial" font-size="12" fill="#5F5E5A">Confident</text>
<text x="480" y="612" text-anchor="middle" font-family="Arial" font-size="12" fill="#5F5E5A">Below threshold</text>

<g>
  <rect x="100" y="636" width="200" height="56" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="200" y="656" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#173404">Answer to user</text>
  <text x="200" y="674" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#27500A">Delivered in-channel</text>
</g>
<g>
  <rect x="380" y="636" width="200" height="56" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text x="480" y="656" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#412402">Human agent handoff</text>
  <text x="480" y="674" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#633806">Full context carried over</text>
</g>

<text x="340" y="730" text-anchor="middle" font-family="Arial" font-size="12" fill="#5F5E5A">Escalation is never dead-ended — a human path is always available</text>
</svg>
